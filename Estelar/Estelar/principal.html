<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estelar DJ - Tienda Pro</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">ESTELAR</div>
        <nav>
            <a onclick="showAll()"><i class="fa-solid fa-border-all"></i> Todo el Catálogo</a>
            <a onclick="showCategory('controladoras')"><i class="fa-solid fa-sliders"></i> Controladoras</a>
            <a onclick="showCategory('auriculares')"><i class="fa-solid fa-headphones"></i> Auriculares</a>
            <a onclick="showCategory('microfonos')"><i class="fa-solid fa-microphone"></i> Micrófonos</a>
            <a onclick="showCategory('preamp')"><i class="fa-solid fa-wave-square"></i> Pre Amps</a>
            <a onclick="showCategory('cables')"><i class="fa-solid fa-plug"></i> Cables</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h2>Bienvenido a Estelar DJ</h2>
            
            <div class="search-container">
                <input type="text" id="productSearch" placeholder="Buscar equipos..." onkeyup="filterProducts()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="cart-icon" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </header>

        <section id="products-grid-container" class="products-grid">
            <div class="product-card" data-category="controladoras">
                <img src="https://via.placeholder.com/250x200/222/ffaa00?text=DJ+PRO" alt="DJ Pro">
                <h3>Controladora DJ Pro</h3>
                <p>$500</p>
                <button onclick="addToCart('Controladora DJ Pro', 500)">Agregar al Carrito</button>
            </div>

            <div class="product-card" data-category="auriculares">
                <img src="https://via.placeholder.com/250x200/222/ffaa00?text=STUDIO" alt="Studio">
                <h3>Auriculares Studio</h3>
                <p>$150</p>
                <button onclick="addToCart('Auriculares Studio', 150)">Agregar al Carrito</button>
            </div>

            <div class="product-card" data-category="microfonos">
                <img src="https://via.placeholder.com/250x200/222/ffaa00?text=MIC" alt="Mic">
                <h3>Micrófono Profesional</h3>
                <p>$200</p>
                <button onclick="addToCart('Micrófono Profesional', 200)">Agregar al Carrito</button>
            </div>

            <div class="product-card" data-category="preamp">
                <img src="https://via.placeholder.com/250x200/222/ffaa00?text=PREAMP" alt="Preamp">
                <h3>Pre Amplificador Audio</h3>
                <p>$300</p>
                <button onclick="addToCart('Pre Amplificador Audio', 300)">Agregar al Carrito</button>
            </div>

            <div class="product-card" data-category="cables">
                <img src="https://via.placeholder.com/250x200/222/ffaa00?text=CABLE+XLR" alt="XLR">
                <h3>Cable XLR Premium</h3>
                <p>$50</p>
                <button onclick="addToCart('Cable XLR Premium', 50)">Agregar al Carrito</button>
            </div>
        </section>
    </main>

    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Mi Carrito</h3>
            <i class="fa-solid fa-xmark" style="cursor:pointer; font-size: 1.5rem;" onclick="toggleCart()"></i>
        </div>

        <ul id="cart-items" style="list-style: none; overflow-y: auto; flex-grow: 1; margin-top: 20px;">
        </ul>

        <div class="cart-footer" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-weight: 600;">TOTAL:</span>
                <span id="cart-total" style="color: var(--naranja-vibrante); font-size: 1.8rem; font-weight: 800;">0</span>
            </div>
            <button class="checkout-btn" id="finish-btn" onclick="processOrder()">Finalizar Compra</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('estelar_cart')) || [];

        window.onload = () => updateCartUI();

        // LÓGICA DEL BUSCADOR
        function filterProducts() {
            let input = document.getElementById('productSearch').value.toLowerCase();
            let cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                let name = card.querySelector('h3').innerText.toLowerCase();
                // Si el nombre incluye lo escrito, se muestra; si no, se oculta
                card.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function addToCart(name, price) {
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            saveAndUpdate();
        }

        function removeItem(name) {
            cart = cart.filter(item => item.name !== name);
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('estelar_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cart-items");
            const countLabel = document.getElementById("cart-count");
            const totalLabel = document.getElementById("cart-total");
            
            list.innerHTML = "";
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#888; margin-top:20px;">Tu carrito está vacío</p>`;
            }

            cart.forEach(item => {
                const li = document.createElement("li");
                li.style.display = "flex";
                li.style.justifyContent = "space-between";
                li.style.alignItems = "center";
                li.style.background = "rgba(255,255,255,0.02)";
                li.style.padding = "15px";
                li.style.borderRadius = "10px";
                li.style.marginBottom = "10px";

                li.innerHTML = `
                    <div class="item-info">
                        <strong style="display:block; font-size: 0.9rem;">${item.name}</strong>
                        <span style="color: var(--naranja-vibrante); font-size: 0.85rem;">${item.quantity} x $${item.price}</span>
                    </div>
                    <button onclick="removeItem('${item.name}')" style="width: auto; padding: 5px 10px; background: transparent; color: #ff4444; border:none; cursor:pointer;">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                list.appendChild(li);
                total += item.price * item.quantity;
                count += item.quantity;
            });

            countLabel.innerText = count;
            totalLabel.innerText = total;
        }

        function toggleCart() {
            document.getElementById("cartPanel").classList.toggle("active");
        }

        function showCategory(category) {
            const products = document.querySelectorAll('.product-card');
            products.forEach(p => {
                p.style.display = (p.getAttribute('data-category') === category) ? "block" : "none";
            });
            // Limpiar buscador al cambiar de categoría para evitar confusiones
            document.getElementById('productSearch').value = "";
        }

        function showAll() {
            const products = document.querySelectorAll('.product-card');
            products.forEach(p => p.style.display = "block");
            document.getElementById('productSearch').value = "";
        }

        function processOrder() {
            if (cart.length === 0) return alert("Agrega productos primero");
            const btn = document.getElementById("finish-btn");
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            setTimeout(() => {
                alert("¡Compra exitosa! Gracias por elegir Estelar DJ.");
                cart = [];
                saveAndUpdate();
                btn.innerText = "FINALIZAR COMPRA";
                btn.disabled = false;
                toggleCart();
            }, 2000);
        }
    </script>
</body>
</html>
