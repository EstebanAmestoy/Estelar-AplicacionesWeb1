<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estelar DJ - Tienda Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">ESTELAR</div>
        <nav class="sidebar-nav" id="main-navbar"></nav>
        <div class="sidebar-footer">
            <div class="user-profile-item" onclick="toggleProfileModal()">
                <div class="avatar-small">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-details">
                    <span class="user-name">Usuario</span>
                </div>
            </div>
            <a onclick="logout()" class="logout-link">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h2>Bienvenido a Estelar DJ</h2>
            <div class="search-container">
                <input type="text" id="productSearch" placeholder="Buscar equipos..." onkeyup="filterProducts()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="cart-icon" onclick="toggleCart()" id="cartIcon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </header>
        <section id="products-grid-container" class="products-grid"></section>
    </main>

    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Mi Carrito</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
        </div>
        <ul id="cart-items" style="list-style: none; overflow-y: auto; flex-grow: 1; margin-top: 20px;"></ul>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-weight: 600;">TOTAL:</span>
                <span id="cart-total">0</span>
            </div>
            <button class="checkout-btn" id="finish-btn" onclick="processOrder()">Finalizar Compra</button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="profile-card">
            <div class="profile-header">
                <h3>Mi Perfil</h3>
                <i class="fa-solid fa-xmark" onclick="toggleProfileModal()" style="cursor:pointer;"></i>
            </div>
            <div class="profile-body">
                <div class="profile-section">
                    <label>Email</label>
                    <p>usuario@estelar.com</p>
                </div>
                <div class="profile-section">
                    <label>Historial de Compras</label>
                    <div id="purchase-history" class="history-list">
                        <p style="color: #666; font-size: 0.8rem;">No hay compras recientes.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuItems = [
            { titulo: "Todo el Catálogo", link: "#", icono: "fa-border-all", action: "showAll()" },
            { titulo: "Controladoras", link: "#", icono: "fa-sliders", action: "showCategory('controladoras')" },
            { titulo: "Auriculares", link: "#", icono: "fa-headphones", action: "showCategory('auriculares')" },
            { titulo: "Micrófonos", link: "#", icono: "fa-microphone", action: "showCategory('microfonos')" },
            { titulo: "Pre Amps", link: "#", icono: "fa-wave-square", action: "showCategory('preamp')" },
            { titulo: "Cables", link: "#", icono: "fa-plug", action: "showCategory('cables')" }
        ];

        const productos = [
            { id: 1, nombre: "Pioneer DDJ-FLX4", desc: "Controladora de 2 canales ideal para principiantes.", precio: 450, cat: "controladoras", img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=500&auto=format&fit=crop" },
            { id: 2, nombre: "Sennheiser HD-25", desc: "El estándar de la industria para monitoreo DJ.", precio: 150, cat: "auriculares", img: "https://images.unsplash.com/photo-1583394838336-acd977736f90?q=80&w=500&auto=format&fit=crop" },
            { id: 3, nombre: "Shure SM7B", desc: "Micrófono dinámico legendario para streaming y estudio.", precio: 400, cat: "microfonos", img: "https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=500&auto=format&fit=crop" },
            { id: 4, nombre: "Focusrite Scarlett", desc: "Interfaz de audio USB de alta fidelidad.", precio: 190, cat: "preamp", img: "https://images.unsplash.com/photo-1619609270129-d164320c67d1?q=80&w=500&auto=format&fit=crop" },
            { id: 5, nombre: "Cable XLR Neutrik", desc: "Cable balanceado profesional de 3 metros.", precio: 35, cat: "cables", img: "https://images.unsplash.com/photo-1635350567634-11e2f6900456?q=80&w=500&auto=format&fit=crop" }
        ];

        let cart = JSON.parse(localStorage.getItem('estelar_cart')) || [];
        let history = JSON.parse(localStorage.getItem('estelar_history')) || [];

        window.onload = () => {
            renderNavbar();
            renderProducts();
            updateCartUI();
            updateHistoryUI();
        };

        function renderNavbar() {
            const nav = document.getElementById('main-navbar');
            nav.innerHTML = menuItems.map(item => `
                <a onclick="${item.action}"><i class="fa-solid ${item.icono}"></i> ${item.titulo}</a>
            `).join('');
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid-container');
            grid.innerHTML = productos.map(p => `
                <div class="product-card" data-category="${p.cat}">
                    <img src="${p.img}" alt="${p.nombre}">
                    <h3>${p.nombre}</h3>
                    <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">${p.desc}</p>
                    <p class="price-label">$${p.precio}</p>
                    <div class="quantity-control">
                        <button onclick="changeQty(${p.id}, -1)">-</button>
                        <span id="qty-${p.id}">1</span>
                        <button onclick="changeQty(${p.id}, 1)">+</button>
                    </div>
                    <button onclick="handleAddToCart(${p.id})">Agregar al Carrito</button>
                </div>
            `).join('');
        }

        function changeQty(id, delta) {
            const el = document.getElementById(`qty-${id}`);
            let val = parseInt(el.innerText) + delta;
            if(val >= 1) el.innerText = val;
        }

        function handleAddToCart(id) {
            const prod = productos.find(p => p.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
            const existing = cart.find(item => item.name === prod.nombre);
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({ name: prod.nombre, price: prod.precio, quantity: qty });
            }
            const icon = document.getElementById('cartIcon');
            icon.classList.add('bump-animation');
            setTimeout(() => icon.classList.remove('bump-animation'), 300);
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('estelar_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cart-items");
            const countLabel = document.getElementById("cart-count");
            const totalLabel = document.getElementById("cart-total");
            list.innerHTML = "";
            let total = 0, count = 0;
            if (cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#888; margin-top:20px;">Tu carrito está vacío</p>`;
            }
            cart.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = `
                    <div class="item-info">
                        <strong>${item.name}</strong>
                        <span>${item.quantity} x $${item.price}</span>
                    </div>
                    <button onclick="removeItem('${item.name}')" class="delete-item-btn">
                        <i class="fa-solid fa-trash"></i>
                    </button>`;
                list.appendChild(li);
                total += item.price * item.quantity;
                count += item.quantity;
            });
            countLabel.innerText = count;
            totalLabel.innerText = `$${total}`;
        }

        function removeItem(name) {
            cart = cart.filter(item => item.name !== name);
            saveAndUpdate();
        }

        function processOrder() {
            if (cart.length === 0) return alert("Agrega productos primero");
            const btn = document.getElementById("finish-btn");
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;
            setTimeout(() => {
                const newOrder = { date: new Date().toLocaleDateString(), total: total };
                history.unshift(newOrder);
                localStorage.setItem('estelar_history', JSON.stringify(history));
                alert("¡Compra exitosa!");
                cart = [];
                saveAndUpdate();
                updateHistoryUI();
                btn.innerText = "FINALIZAR COMPRA";
                btn.disabled = false;
                toggleCart();
            }, 2000);
        }

        function updateHistoryUI() {
            const container = document.getElementById('purchase-history');
            if (history.length === 0) return;
            container.innerHTML = history.map(order => `
                <div class="history-item">
                    <span>${order.date}</span>
                    <strong>$${order.total}</strong>
                </div>`).join('');
        }

        function filterProducts() {
            let input = document.getElementById('productSearch').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                let name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "flex" : "none";
            });
        }

        function showCategory(c) {
            document.querySelectorAll('.product-card').forEach(p => {
                p.style.display = (p.getAttribute('data-category') === c) ? "flex" : "none";
            });
        }

        function showAll() {
            document.querySelectorAll('.product-card').forEach(p => p.style.display = "flex");
        }

        function logout() {
            if(confirm("¿Cerrar sesión?")) window.location.href = "login.html";
        }

        function toggleCart() { document.getElementById("cartPanel").classList.toggle("active"); }

        function toggleProfileModal() {
            const modal = document.getElementById('profileModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = (e) => {
            const modal = document.getElementById('profileModal');
            if (e.target == modal) modal.style.display = "none";
        }
    </script>
</body>
</html>
